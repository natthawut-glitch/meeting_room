<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองห้องประชุม กองแผนงาน มมส</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts: Sarabun (Thai) -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons: Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f4f8;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .scale-in {
            animation: scaleIn 0.2s ease-out;
        }
        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        .loader-lg {
            width: 50px;
            height: 50px;
            border-width: 5px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Configuration ---
        // URL ของ Google Apps Script Web App (ต้องตั้งค่า Who has access เป็น Anyone)
        const API_URL = "https://script.google.com/macros/s/AKfycbxBoxH2LFyWTES9qP49nVHsUb77ppPeG9U1KuXEyapwqRIrzQgD_2CNJux_rPXVUuFqug/exec";
        const ROOM_NAME = "ห้องประชุมกองแผนงาน";
        const ADMIN_USER = "Admin";
        const ADMIN_PASS = "plan@043754240";

        // --- Initial Mock Data (สำหรับโหมด Offline) ---
        const INITIAL_BOOKINGS = [
            { 
                id: 1, 
                unit: "กองแผนงาน (ตัวอย่าง)", 
                name: "สมชาย ใจดี", 
                email: "somchai@example.com", 
                phone: "0812345678", 
                topic: "ประชุมประจำเดือน", 
                date: new Date().toISOString().split('T')[0], 
                start: "09:00", 
                end: "12:00", 
                equipment: ["คอมพิวเตอร์", "เครื่องเสียง"], 
                status: "อนุมัติ", 
                room: ROOM_NAME,
                createdAt: new Date(new Date().setDate(new Date().getDate() - 3)).toISOString(), 
                approvedAt: new Date(new Date().setDate(new Date().getDate() - 1)).toISOString()
            },
            { 
                id: 2, 
                unit: "สำนักคอมพิวเตอร์ (ตัวอย่าง)", 
                name: "วิไลวรรณ รักเรียน", 
                email: "wilai@example.com", 
                phone: "0898765432", 
                topic: "อบรมการใช้ระบบ", 
                date: new Date(new Date().setDate(new Date().getDate() + 1)).toISOString().split('T')[0], 
                start: "13:00", 
                end: "16:00", 
                equipment: ["ระบบประชุมออนไลน์"], 
                status: "รออนุมัติ", 
                room: ROOM_NAME,
                createdAt: new Date().toISOString(), 
                approvedAt: null
            }
        ];

        // --- Helper Functions ---
        const generateId = () => '_' + Math.random().toString(36).substr(2, 9);
        
        const formatDateThai = (dateStr) => {
            if (!dateStr) return "-";
            const date = new Date(dateStr);
            return date.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Bangkok' });
        };

        const formatDateTimeThai = (isoString) => {
            if (!isoString) return "-";
            const date = new Date(isoString);
            return date.toLocaleDateString('th-TH', { 
                day: 'numeric', month: 'short', year: '2-digit', 
                hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Bangkok' 
            });
        };

        const getDurationText = (start, end) => {
            if (!start || !end) return "";
            const s = new Date(start);
            const e = new Date(end);
            const diffMs = Math.abs(e - s);
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return "ภายใน 1 วัน";
            return `${diffDays} วัน`;
        };

        const isPastDate = (dateStr) => {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const checkDate = new Date(dateStr);
            return checkDate < today;
        };

        // --- Components ---

        // 1. Navigation Bar
        const Navbar = ({ setPage, currentPage, isAdmin, handleLogout, isLoading, isOffline }) => (
            <>
                <nav className="bg-blue-700 text-white shadow-lg sticky top-0 z-50">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-center justify-between h-16">
                            <div className="flex items-center cursor-pointer" onClick={() => setPage('home')}>
                                <i data-lucide="calendar" className="w-8 h-8 mr-2 text-yellow-400"></i>
                                <span className="font-bold text-xl tracking-wide">ระบบจองห้องประชุม กองแผนงาน มมส</span>
                            </div>
                            <div className="hidden md:block">
                                <div className="ml-10 flex items-center space-x-4">
                                    <NavBtn label="ปฏิทิน" active={currentPage === 'home'} onClick={() => setPage('home')} />
                                    <NavBtn label="รายการจองทั้งหมด" active={currentPage === 'list'} onClick={() => setPage('list')} />
                                    <NavBtn label="สถิติการใช้งาน" active={currentPage === 'stats'} onClick={() => setPage('stats')} />
                                    {isAdmin ? (
                                        <>
                                            <span className="text-yellow-300 font-medium px-3">Admin Mode</span>
                                            <button onClick={handleLogout} className="bg-red-500 hover:bg-red-600 text-white px-3 py-2 rounded-md text-sm font-medium transition">ออกจากระบบ</button>
                                        </>
                                    ) : (
                                        <NavBtn label="เข้าสู่ระบบ Admin" active={currentPage === 'login'} onClick={() => setPage('login')} />
                                    )}
                                    {isLoading && <div className="loader ml-4 w-6 h-6 border-white border-t-blue-500"></div>}
                                </div>
                            </div>
                            {/* Mobile Menu Button (Simplified) */}
                            <div className="-mr-2 flex md:hidden items-center">
                                {isLoading && <div className="loader mr-2 w-5 h-5 border-2"></div>}
                                <button onClick={() => setPage('home')} className="text-gray-200 hover:text-white p-2">
                                    <i data-lucide="menu" className="w-6 h-6"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </nav>
                {isOffline && (
                    <div className="bg-orange-500 text-white text-center py-1 text-sm font-bold animate-pulse">
                        <i data-lucide="wifi-off" className="inline w-4 h-4 mr-1"></i>
                        ไม่สามารถเชื่อมต่อ Google Sheet ได้ - ระบบกำลังทำงานในโหมดออฟไลน์ (ข้อมูลจะถูกบันทึกในเครื่องชั่วคราว)
                    </div>
                )}
            </>
        );

        const NavBtn = ({ label, active, onClick }) => (
            <button 
                onClick={onClick}
                className={`px-3 py-2 rounded-md text-sm font-medium transition duration-200 ${active ? 'bg-blue-800 text-white border-b-2 border-yellow-400' : 'text-blue-100 hover:bg-blue-600'}`}
            >
                {label}
            </button>
        );

        // 2. Submission Status Overlay
        const SubmissionOverlay = ({ status, message, onClose }) => {
            if (status === 'idle') return null;

            let icon, title, titleColor;

            if (status === 'submitting') {
                return (
                    <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black bg-opacity-70 backdrop-blur-sm fade-in">
                        <div className="bg-white p-8 rounded-xl shadow-2xl flex flex-col items-center max-w-sm w-full text-center scale-in">
                            <div className="loader loader-lg border-t-blue-600 mb-4"></div>
                            <h3 className="text-xl font-bold text-gray-800 mb-2">กำลังบันทึกข้อมูล...</h3>
                            <p className="text-gray-500 text-sm">{message || "กรุณารอสักครู่"}</p>
                        </div>
                    </div>
                );
            }

            if (status === 'success') {
                icon = <i data-lucide="check-circle" className="w-16 h-16 text-green-500 mb-4 animate-bounce"></i>;
                title = "บันทึกสำเร็จ!";
                titleColor = "text-green-600";
            } else if (status === 'error') {
                icon = <i data-lucide="alert-triangle" className="w-16 h-16 text-red-500 mb-4 animate-pulse"></i>;
                title = "บันทึกออนไลน์ไม่สำเร็จ";
                titleColor = "text-red-600";
            } else if (status === 'success-offline') {
                icon = <i data-lucide="save" className="w-16 h-16 text-yellow-500 mb-4"></i>;
                title = "บันทึกออฟไลน์เรียบร้อย";
                titleColor = "text-yellow-600";
            }

            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black bg-opacity-70 backdrop-blur-sm fade-in">
                    <div className="bg-white p-8 rounded-xl shadow-2xl flex flex-col items-center max-w-md w-full text-center scale-in border-t-8 border-blue-500">
                        {icon}
                        <h3 className={`text-2xl font-bold ${titleColor} mb-2`}>{title}</h3>
                        <p className="text-gray-600 mb-6 whitespace-pre-line leading-relaxed">{message}</p>
                        <button 
                            onClick={onClose}
                            className="px-6 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition w-full shadow-lg"
                        >
                            ตกลง
                        </button>
                    </div>
                </div>
            );
        };

        // 3. Calendar View
        const CalendarView = ({ bookings, onSelectDate, onSelectBooking, refreshData, onViewHistory }) => {
            const [currentDate, setCurrentDate] = useState(new Date());

            const daysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const firstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const daysCount = daysInMonth(year, month);
            const startDay = firstDayOfMonth(year, month);

            const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));

            const days = [];
            for (let i = 0; i < startDay; i++) days.push(null);
            for (let i = 1; i <= daysCount; i++) days.push(new Date(year, month, i));

            const getBookingsForDate = (date) => {
                if (!date) return [];
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                const dateStr = `${y}-${m}-${d}`;
                return bookings.filter(b => b.date === dateStr);
            };

            return (
                <div className="fade-in max-w-6xl mx-auto mt-8 p-6 bg-white rounded-xl shadow-md">
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex space-x-2">
                            <button onClick={prevMonth} className="p-2 hover:bg-blue-100 rounded-full text-blue-600"><i data-lucide="chevron-left" className="w-6 h-6"></i></button>
                            <button onClick={refreshData} className="p-2 hover:bg-blue-100 rounded-full text-blue-600" title="รีเฟรชข้อมูล"><i data-lucide="refresh-cw" className="w-6 h-6"></i></button>
                        </div>
                        <h2 className="text-2xl font-bold text-blue-800">
                            {currentDate.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' })}
                        </h2>
                        <button onClick={nextMonth} className="p-2 hover:bg-blue-100 rounded-full text-blue-600"><i data-lucide="chevron-right" className="w-6 h-6"></i></button>
                    </div>

                    <div className="grid grid-cols-7 gap-2 mb-2 text-center font-bold text-gray-600">
                        <div className="text-red-500">อา</div>
                        <div>จ</div>
                        <div>อ</div>
                        <div>พ</div>
                        <div>พฤ</div>
                        <div>ศ</div>
                        <div className="text-blue-500">ส</div>
                    </div>

                    <div className="grid grid-cols-7 gap-2">
                        {days.map((date, index) => {
                            if (!date) return <div key={index} className="h-32 bg-gray-50 rounded-lg"></div>;
                            
                            const y = date.getFullYear();
                            const m = String(date.getMonth() + 1).padStart(2, '0');
                            const d = String(date.getDate()).padStart(2, '0');
                            const dateStr = `${y}-${m}-${d}`;
                            
                            const isPast = isPastDate(dateStr);
                            const dayBookings = getBookingsForDate(date);
                            const isToday = new Date().toDateString() === date.toDateString();

                            return (
                                <div 
                                    key={index}
                                    onClick={() => {
                                        if (isPast) {
                                            onViewHistory(dateStr, dayBookings);
                                        } else {
                                            onSelectDate(dateStr, isPast);
                                        }
                                    }}
                                    className={`h-32 p-2 border rounded-lg cursor-pointer transition relative overflow-hidden group
                                        ${isToday ? 'border-blue-500 bg-blue-50 ring-2 ring-blue-200' : 'border-gray-200'}
                                        ${isPast ? 'bg-gray-100 hover:bg-blue-50' : 'bg-white hover:border-yellow-400 hover:shadow-md'}
                                    `}
                                >
                                    <span className={`text-sm font-semibold ${isToday ? 'text-blue-600' : (isPast ? 'text-blue-500' : 'text-gray-700')}`}>{date.getDate()}</span>
                                    
                                    {/* Show bookings list for ALL dates (including past) */}
                                    <div className="mt-1 space-y-1 overflow-y-auto max-h-[80px] scrollbar-hide">
                                        {dayBookings.map(b => (
                                            <div 
                                                key={b.id}
                                                onClick={(e) => { 
                                                    if (!isPast) {
                                                        e.stopPropagation(); 
                                                        onSelectBooking(b); 
                                                    }
                                                }}
                                                className={`text-xs p-1 rounded truncate 
                                                    ${isPast 
                                                        ? 'bg-blue-50 text-blue-700 border border-blue-100' // Past: Subtle Blue/Gray
                                                        : (b.status === 'ไม่อนุมัติ' ? 'bg-red-400 text-white' : (b.status === 'อนุมัติ' ? 'bg-green-500 text-white' : 'bg-yellow-500 text-white'))
                                                    }`}
                                            >
                                                {b.start.substring(0,5)}-{b.end.substring(0,5)} {b.unit}
                                            </div>
                                        ))}
                                    </div>
                                    
                                    {/* Icon cues (Only for future/today) */}
                                    {!isPast && (
                                        <div className="absolute inset-0 bg-blue-600 bg-opacity-0 group-hover:bg-opacity-5 flex items-center justify-center pointer-events-none">
                                            <i data-lucide="plus-circle" className="w-8 h-8 text-blue-600 opacity-0 group-hover:opacity-100 transition duration-300"></i>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // 3.5 History Modal (Updated)
        const HistoryModal = ({ isOpen, onClose, date, bookings }) => {
            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 backdrop-blur-sm p-4 fade-in">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[80vh]">
                        <div className="bg-blue-600 px-6 py-4 flex justify-between items-center">
                            <h3 className="text-xl font-bold text-white flex items-center">
                                <i data-lucide="history" className="mr-2"></i> ประวัติการใช้ห้อง ({formatDateThai(date)})
                            </h3>
                            <button onClick={onClose} className="text-white hover:text-gray-200"><i data-lucide="x" className="w-6 h-6"></i></button>
                        </div>
                        <div className="p-6 overflow-y-auto flex-grow">
                            {bookings.length === 0 ? (
                                <div className="text-center text-gray-500 py-8">ไม่มีรายการจองในวันนี้</div>
                            ) : (
                                <div className="space-y-4">
                                    {bookings.map((b, idx) => (
                                        <div key={idx} className="border border-gray-200 rounded-lg p-4 hover:bg-gray-50 transition border-l-4 border-l-blue-500">
                                            <h4 className="font-bold text-lg text-blue-800 mb-2">{b.topic}</h4>
                                            <div className="text-sm text-gray-600 space-y-1">
                                                <div className="flex items-center"><i data-lucide="clock" className="w-4 h-4 mr-2"></i> {b.start} - {b.end} น.</div>
                                                <div className="flex items-center"><i data-lucide="building" className="w-4 h-4 mr-2"></i> {b.unit}</div>
                                                <div className="flex items-center">
                                                    <span className={`px-2 py-0.5 rounded text-xs text-white ${b.status === 'อนุมัติ' ? 'bg-green-500' : (b.status === 'ไม่อนุมัติ' ? 'bg-red-500' : 'bg-yellow-500')}`}>
                                                        {b.status}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        <div className="p-4 border-t bg-gray-50 flex justify-end">
                            <button 
                                onClick={onClose} 
                                className="px-6 py-2 bg-red-500 text-white font-bold rounded-lg hover:bg-red-600 transition shadow-md"
                            >
                                ปิดหน้าต่าง
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // 4. Booking Modal
        const BookingModal = ({ isOpen, onClose, date, onSubmit, isSubmitting, onError }) => {
            if (!isOpen) return null;

            const handleSubmit = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                
                // Equipment
                const equipment = [];
                if (formData.get('eq_computer')) equipment.push('คอมพิวเตอร์');
                if (formData.get('eq_audio')) equipment.push('เครื่องเสียง');
                if (formData.get('eq_online')) equipment.push('ระบบประชุมออนไลน์');
                
                // Validation
                if (data.start < "08:30") { 
                    onError("เริ่มจองได้ตั้งแต่ 08:30 น. ครับ"); 
                    return; 
                }
                const startT = new Date(`2000-01-01T${data.start}`);
                const endT = new Date(`2000-01-01T${data.end}`);
                const diffMins = (endT - startT) / 60000;
                
                if (diffMins < 10) { 
                    onError("เวลาสิ้นสุดต้องหลังเวลาเริ่มอย่างน้อย 10 นาที"); 
                    return; 
                }

                // 30-Min Rule
                const [y, m, d] = date.split('-').map(Number);
                const [h, min] = data.start.split(':').map(Number);
                
                const bookingDateTime = new Date(y, m - 1, d, h, min);
                const now = new Date();
                
                const diffMs = bookingDateTime - now;
                const diffMinsFromNow = diffMs / (1000 * 60);

                if (diffMinsFromNow < 30) {
                     const currentH = now.getHours().toString().padStart(2, '0');
                     const currentM = now.getMinutes().toString().padStart(2, '0');
                     onError(`ต้องจองล่วงหน้าอย่างน้อย 30 นาทีครับ (ขณะนี้ ${currentH}:${currentM} น.)`);
                     return;
                }

                onSubmit({ ...data, equipment, date, room: ROOM_NAME });
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 backdrop-blur-sm p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden animate-bounce-in">
                        <div className="bg-blue-600 px-6 py-4 flex justify-between items-center">
                            <h3 className="text-xl font-bold text-white flex items-center">
                                <i data-lucide="calendar-plus" className="mr-2"></i> จองห้องประชุม ({formatDateThai(date)})
                            </h3>
                            <button onClick={onClose} disabled={isSubmitting} className="text-white hover:text-gray-200"><i data-lucide="x" className="w-6 h-6"></i></button>
                        </div>
                        <form onSubmit={handleSubmit} className="p-6 space-y-4">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">หน่วยงาน</label>
                                    <input required name="unit" type="text" className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" placeholder="เช่น กองแผนงาน" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">ชื่อ-สกุล ผู้จอง</label>
                                    <input required name="name" type="text" className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">อีเมล</label>
                                    <input required name="email" type="email" className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">เบอร์โทรศัพท์</label>
                                    <input required name="phone" type="tel" pattern="[0-9]+" title="กรุณากรอกตัวเลขเท่านั้น" className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" />
                                </div>
                            </div>
                            
                            <div>
                                <label className="block text-sm font-medium text-gray-700">หัวข้อการประชุม</label>
                                <input required name="topic" type="text" className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">เวลาเริ่ม (08:30+)</label>
                                    <input required name="start" type="time" min="08:30" className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">เวลาสิ้นสุด</label>
                                    <input required name="end" type="time" className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" />
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">อุปกรณ์ที่ขอใช้</label>
                                <div className="flex space-x-4">
                                    <label className="inline-flex items-center">
                                        <input type="checkbox" name="eq_computer" className="rounded text-blue-600 focus:ring-blue-500" />
                                        <span className="ml-2">คอมพิวเตอร์</span>
                                    </label>
                                    <label className="inline-flex items-center">
                                        <input type="checkbox" name="eq_audio" className="rounded text-blue-600 focus:ring-blue-500" />
                                        <span className="ml-2">เครื่องเสียง</span>
                                    </label>
                                    <label className="inline-flex items-center">
                                        <input type="checkbox" name="eq_online" className="rounded text-blue-600 focus:ring-blue-500" />
                                        <span className="ml-2">ระบบ Online</span>
                                    </label>
                                </div>
                            </div>

                            <div className="pt-4 flex justify-end space-x-3">
                                <button type="button" onClick={onClose} disabled={isSubmitting} className="px-4 py-2 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300 transition">ยกเลิก</button>
                                <button type="submit" disabled={isSubmitting} className="px-6 py-2 bg-yellow-400 text-blue-900 font-bold rounded-md hover:bg-yellow-500 shadow-md transition flex items-center">
                                    ยืนยันการจอง
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // 5. Detail Modal
        const DetailModal = ({ booking, onClose }) => {
            if (!booking) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-md animate-fade-in-up border-t-4 border-blue-600 flex flex-col">
                        <div className="p-6 flex-grow">
                            <div className="flex justify-between items-start mb-4">
                                <h3 className="text-xl font-bold text-gray-900">{booking.topic}</h3>
                                <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><i data-lucide="x"></i></button>
                            </div>
                            
                            <div className="space-y-3 text-sm text-gray-600">
                                <div className="flex items-center"><i data-lucide="clock" className="w-4 h-4 mr-2 text-blue-500"></i> {formatDateThai(booking.date)} | {booking.start} - {booking.end} น.</div>
                                <div className="flex items-center"><i data-lucide="building" className="w-4 h-4 mr-2 text-blue-500"></i> {booking.unit}</div>
                                <div className="flex items-center"><i data-lucide="user" className="w-4 h-4 mr-2 text-blue-500"></i> {booking.name}</div>
                                <div className="flex items-center"><i data-lucide="phone" className="w-4 h-4 mr-2 text-blue-500"></i> {booking.phone}</div>
                                <div className="flex items-center"><i data-lucide="mail" className="w-4 h-4 mr-2 text-blue-500"></i> {booking.email}</div>
                                
                                <div className="pt-2 border-t mt-2">
                                    <strong className="block mb-1 text-gray-800">อุปกรณ์:</strong>
                                    {booking.equipment && booking.equipment.length > 0 ? (
                                        <div className="flex flex-wrap gap-2">
                                            {booking.equipment.map((eq, i) => (
                                                <span key={i} className="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full">{eq}</span>
                                            ))}
                                        </div>
                                    ) : <span>ไม่ระบุ</span>}
                                </div>

                                <div className="pt-2 flex justify-between items-center">
                                    <span className="font-bold">สถานะ:</span>
                                    <span className={`px-2 py-1 rounded text-xs font-bold text-white
                                        ${booking.status === 'อนุมัติ' ? 'bg-green-500' : (booking.status === 'ไม่อนุมัติ' ? 'bg-red-500' : 'bg-yellow-500')}`}>
                                        {booking.status}
                                    </span>
                                </div>

                                {booking.createdAt && (
                                    <div className="pt-2 border-t mt-2">
                                        <strong className="block mb-1 text-gray-800">Timeline:</strong>
                                        <div className="text-xs space-y-1">
                                            <div>📝 ขอ: {formatDateTimeThai(booking.createdAt)}</div>
                                            {booking.approvedAt && (
                                                <div className="text-green-600">
                                                    ✅ อนุมัติ: {formatDateTimeThai(booking.approvedAt)} 
                                                    ({getDurationText(booking.createdAt, booking.approvedAt)})
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="p-4 bg-gray-50 border-t rounded-b-xl flex justify-end">
                            <button 
                                onClick={onClose} 
                                className="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded font-bold transition text-sm shadow"
                            >
                                ปิดหน้าต่าง
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // 6. List View (Updated with Tabs)
        const BookingListView = ({ bookings, onDelete, isAdmin, onStatusChange, refreshData }) => {
            const [filterUnit, setFilterUnit] = useState('');
            const [filterDate, setFilterDate] = useState('');
            const [activeTab, setActiveTab] = useState('pending'); // 'pending', 'approved'

            const filteredBookings = bookings.filter(b => {
                // Tab Filter
                const isPending = b.status === 'รออนุมัติ';
                if (activeTab === 'pending' && !isPending) return false;
                if (activeTab === 'approved' && isPending) return false; // Show Approved & Rejected here

                // Search Filter
                const matchUnit = filterUnit ? b.unit.includes(filterUnit) || b.name.includes(filterUnit) : true;
                const matchDate = filterDate ? b.date === filterDate : true;
                return matchUnit && matchDate;
            }).sort((a, b) => {
                if (a.date !== b.date) return b.date.localeCompare(a.date);
                return a.start.localeCompare(b.start);
            });

            // Count for badges
            const pendingCount = bookings.filter(b => b.status === 'รออนุมัติ').length;
            const approvedCount = bookings.filter(b => b.status !== 'รออนุมัติ').length;

            return (
                <div className="fade-in max-w-7xl mx-auto mt-8 p-6 bg-white rounded-xl shadow-md">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-blue-800 flex items-center">
                            <i data-lucide="list" className="mr-2"></i> รายการจองทั้งหมด
                        </h2>
                        <button onClick={refreshData} className="flex items-center text-blue-600 hover:text-blue-800">
                            <i data-lucide="refresh-cw" className="w-5 h-5 mr-1"></i> รีเฟรช
                        </button>
                    </div>

                    {/* Tabs */}
                    <div className="flex space-x-2 mb-6 border-b border-gray-200">
                        <button 
                            onClick={() => setActiveTab('pending')}
                            className={`pb-3 px-4 text-sm font-medium flex items-center transition-colors relative ${activeTab === 'pending' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                        >
                            <span className="mr-2">⏳ รออนุมัติ</span>
                            <span className="bg-yellow-100 text-yellow-800 px-2 py-0.5 rounded-full text-xs">{pendingCount}</span>
                        </button>
                        <button 
                            onClick={() => setActiveTab('approved')}
                            className={`pb-3 px-4 text-sm font-medium flex items-center transition-colors relative ${activeTab === 'approved' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                        >
                            <span className="mr-2">✅ อนุมัติ / ประวัติ</span>
                            <span className="bg-gray-100 text-gray-800 px-2 py-0.5 rounded-full text-xs">{approvedCount}</span>
                        </button>
                    </div>

                    <div className="flex flex-wrap gap-4 mb-6 p-4 bg-gray-50 rounded-lg">
                        <input 
                            type="text" 
                            placeholder="ค้นหาชื่อ หรือ หน่วยงาน..." 
                            className="border p-2 rounded flex-grow"
                            value={filterUnit}
                            onChange={(e) => setFilterUnit(e.target.value)}
                        />
                        <input 
                            type="date" 
                            className="border p-2 rounded"
                            value={filterDate}
                            onChange={(e) => setFilterDate(e.target.value)}
                        />
                        <button onClick={() => {setFilterUnit(''); setFilterDate('')}} className="text-blue-600 hover:underline">ล้างตัวกรอง</button>
                    </div>

                    <div className="overflow-x-auto">
                        <table className="min-w-full divide-y divide-gray-200">
                            <thead className="bg-blue-50">
                                <tr>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-blue-800 uppercase tracking-wider">วัน/เวลา</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-blue-800 uppercase tracking-wider">ห้อง</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-blue-800 uppercase tracking-wider">หัวข้อ</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-blue-800 uppercase tracking-wider">Timeline (ประวัติ)</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-blue-800 uppercase tracking-wider">ผู้จอง/หน่วยงาน</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-blue-800 uppercase tracking-wider">สถานะ</th>
                                    {isAdmin && <th className="px-6 py-3 text-right text-xs font-medium text-blue-800 uppercase tracking-wider">จัดการ</th>}
                                </tr>
                            </thead>
                            <tbody className="bg-white divide-y divide-gray-200">
                                {filteredBookings.map(b => (
                                    <tr key={b.id} className="hover:bg-gray-50 transition">
                                        <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                            <div>{formatDateThai(b.date)}</div>
                                            <div className="text-gray-500 text-xs">{b.start} - {b.end}</div>
                                        </td>
                                        <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{b.room || ROOM_NAME}</td>
                                        <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{b.topic}</td>
                                        <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                            <div className="flex flex-col space-y-1">
                                                <div className="text-xs">📝 ขอ: {formatDateTimeThai(b.createdAt)}</div>
                                                {b.status === 'อนุมัติ' && b.approvedAt ? (
                                                    <div className="text-xs text-green-600">
                                                        ✅ อนุมัติ: {formatDateTimeThai(b.approvedAt)} 
                                                        <br/>
                                                        <span className="font-bold">({getDurationText(b.createdAt, b.approvedAt)})</span>
                                                    </div>
                                                ) : (
                                                    b.status === 'อนุมัติ' && <span className="text-xs text-green-600">✅ อนุมัติแล้ว</span>
                                                )}
                                            </div>
                                        </td>
                                        <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                            <div className="font-medium">{b.name}</div>
                                            <div className="text-xs">{b.unit}</div>
                                            <div className="text-xs">{b.phone}</div>
                                        </td>
                                        <td className="px-6 py-4 whitespace-nowrap">
                                            <span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full 
                                                ${b.status === 'อนุมัติ' ? 'bg-green-100 text-green-800' : (b.status === 'ไม่อนุมัติ' ? 'bg-red-100 text-red-800' : 'bg-yellow-100 text-yellow-800')}`}>
                                                {b.status}
                                            </span>
                                        </td>
                                        {isAdmin && (
                                            <td className="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                                                <button onClick={() => onStatusChange(b.id, 'อนุมัติ')} className="text-green-600 hover:text-green-900" title="อนุมัติ"><i data-lucide="check-circle" className="w-5 h-5"></i></button>
                                                <button onClick={() => onStatusChange(b.id, 'ไม่อนุมัติ')} className="text-yellow-600 hover:text-yellow-900" title="ไม่อนุมัติ"><i data-lucide="x-circle" className="w-5 h-5"></i></button>
                                                <button onClick={() => onDelete(b.id)} className="text-red-600 hover:text-red-900" title="ลบรายการ"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                            </td>
                                        )}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {filteredBookings.length === 0 && <div className="p-4 text-center text-gray-500">ไม่พบรายการจองในหมวดหมู่นี้</div>}
                    </div>
                </div>
            );
        };

        // 7. Stats
        const StatsView = ({ bookings }) => {
            // Filter States
            const [yearFilter, setYearFilter] = useState(new Date().getFullYear());
            const [unitFilter, setUnitFilter] = useState('');
            const [nameFilter, setNameFilter] = useState('');

            // Filter Logic
            const filteredBookings = bookings.filter(b => {
                if (!b.date) return false;
                const bYear = parseInt(b.date.substring(0, 4));
                const matchYear = bYear === yearFilter;
                const matchUnit = unitFilter ? b.unit.includes(unitFilter) : true;
                const matchName = nameFilter ? b.name.includes(nameFilter) : true;
                return matchYear && matchUnit && matchName;
            });

            // Stats Calculation based on filteredBookings
            const totalBookings = filteredBookings.length;
            
            // Monthly Data (Ensure Jan-Dec)
            const monthsData = Array.from({ length: 12 }, (_, i) => {
                const monthIndex = i + 1; // 1-12
                const count = filteredBookings.filter(b => parseInt(b.date.substring(5, 7)) === monthIndex).length;
                return { 
                    monthIndex, 
                    name: new Date(2000, i, 1).toLocaleDateString('th-TH', { month: 'long' }), 
                    count 
                };
            });

            const byUnit = filteredBookings.reduce((acc, b) => {
                if(!b.unit) return acc;
                acc[b.unit] = (acc[b.unit] || 0) + 1;
                return acc;
            }, {});
            
            const topUnit = Object.entries(byUnit).sort((a,b) => b[1] - a[1])[0];

            return (
                <div className="fade-in max-w-7xl mx-auto mt-8 p-6 space-y-6">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-4">
                        <h2 className="text-2xl font-bold text-blue-800 flex items-center mb-4 md:mb-0"><i data-lucide="bar-chart-2" className="mr-2"></i> สถิติการใช้งาน</h2>
                        
                        {/* Filters */}
                        <div className="flex flex-wrap gap-2">
                            <select 
                                value={yearFilter} 
                                onChange={(e) => setYearFilter(parseInt(e.target.value))}
                                className="border p-2 rounded text-sm"
                            >
                                {[...Array(5)].map((_, i) => {
                                    const y = new Date().getFullYear() - 2 + i; // Current year +/- 2
                                    return <option key={y} value={y}>ปี {y + 543}</option>;
                                })}
                            </select>
                            <input 
                                type="text" 
                                placeholder="กรองชื่อผู้จอง..." 
                                value={nameFilter}
                                onChange={(e) => setNameFilter(e.target.value)}
                                className="border p-2 rounded text-sm"
                            />
                            <input 
                                type="text" 
                                placeholder="กรองหน่วยงาน..." 
                                value={unitFilter}
                                onChange={(e) => setUnitFilter(e.target.value)}
                                className="border p-2 rounded text-sm"
                            />
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow-md border-l-4 border-blue-500">
                            <h3 className="text-gray-500 text-sm uppercase">จำนวนการจองทั้งหมด ({yearFilter+543})</h3>
                            <p className="text-3xl font-bold text-blue-900">{totalBookings} <span className="text-base font-normal text-gray-500">ครั้ง</span></p>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-md border-l-4 border-green-500">
                            <h3 className="text-gray-500 text-sm uppercase">หน่วยงานที่ใช้บ่อยที่สุด</h3>
                            <p className="text-2xl font-bold text-green-900 truncate">{topUnit ? topUnit[0] : '-'}</p>
                            <p className="text-sm text-gray-500">{topUnit ? `${topUnit[1]} ครั้ง` : ''}</p>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-md border-l-4 border-yellow-400">
                            <h3 className="text-gray-500 text-sm uppercase">ห้องยอดนิยม</h3>
                            <p className="text-2xl font-bold text-yellow-700">{ROOM_NAME}</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Monthly Chart */}
                        <div className="bg-white p-6 rounded-xl shadow-md">
                            <h3 className="font-bold text-gray-700 mb-4">สรุปรายเดือน (ม.ค. - ธ.ค.)</h3>
                            <div className="space-y-4 max-h-[400px] overflow-y-auto">
                                {monthsData.map(m => {
                                    const percent = totalBookings > 0 ? (m.count / totalBookings) * 100 : 0;
                                    
                                    return (
                                        <div key={m.monthIndex}>
                                            <div className="flex justify-between text-sm mb-1">
                                                <span>{m.name}</span>
                                                <span className="font-bold">{m.count} ครั้ง</span>
                                            </div>
                                            <div className="w-full bg-gray-200 rounded-full h-2.5">
                                                <div className="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style={{width: `${percent}%`}}></div>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>

                        {/* Unit Chart */}
                        <div className="bg-white p-6 rounded-xl shadow-md">
                            <h3 className="font-bold text-gray-700 mb-4">สรุปตามหน่วยงาน (Top 5)</h3>
                            <div className="space-y-3">
                                {Object.entries(byUnit).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([unit, count]) => (
                                    <div key={unit} className="flex items-center">
                                        <div className="w-1/3 truncate text-sm text-gray-600" title={unit}>{unit}</div>
                                        <div className="w-2/3 flex items-center">
                                            <div className="h-4 bg-yellow-400 rounded-r-md transition-all duration-500" style={{width: `${totalBookings > 0 ? (count/totalBookings)*100 : 0}%`}}></div>
                                            <span className="ml-2 text-xs font-bold">{count}</span>
                                        </div>
                                    </div>
                                ))}
                                {Object.keys(byUnit).length === 0 && <div className="text-center text-gray-400">ยังไม่มีข้อมูล</div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 8. Login
        const LoginView = ({ onLogin }) => {
            const [user, setUser] = useState('Admin');
            const [pass, setPass] = useState('');
            const [error, setError] = useState('');
            const handleSubmit = (e) => {
                e.preventDefault();
                if (user === ADMIN_USER && pass === ADMIN_PASS) onLogin(true);
                else setError('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
            };
            return (
                <div className="flex items-center justify-center min-h-[80vh] fade-in">
                    <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border-t-4 border-blue-600">
                        <h2 className="text-2xl font-bold text-center text-blue-800 mb-6">เข้าสู่ระบบผู้ดูแล (Admin)</h2>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Username</label>
                                <input type="text" value={user} onChange={e => setUser(e.target.value)} className="mt-1 block w-full border p-2 rounded" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Password</label>
                                <input type="password" value={pass} onChange={e => setPass(e.target.value)} className="mt-1 block w-full border p-2 rounded" />
                            </div>
                            {error && <p className="text-red-500 text-sm text-center">{error}</p>}
                            <button type="submit" className="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 font-bold">เข้าสู่ระบบ</button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- Main App ---
        const App = () => {
            const [page, setPage] = useState('home'); 
            const [bookings, setBookings] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [isOffline, setIsOffline] = useState(false);
            
            // Modal States
            const [isBookingModalOpen, setBookingModalOpen] = useState(false);
            const [selectedDate, setSelectedDate] = useState('');
            const [selectedBooking, setSelectedBooking] = useState(null);
            
            // History Modal States
            const [isHistoryModalOpen, setHistoryModalOpen] = useState(false);
            const [historyDate, setHistoryDate] = useState('');
            const [historyBookings, setHistoryBookings] = useState([]);

            // Notification State
            const [notification, setNotification] = useState(null);

            // Submission Status States
            const [submissionStatus, setSubmissionStatus] = useState('idle'); // idle, submitting, success, success-offline, error
            const [submissionMessage, setSubmissionMessage] = useState('');

            // API Helper
            const apiCall = async (action, payload = {}) => {
                const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("Request timed out")), 5000));
                try {
                    const fetchPromise = fetch(API_URL, {
                        method: 'POST',
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify({ action, ...payload })
                    });
                    const response = await Promise.race([fetchPromise, timeout]);
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    const result = await response.json();
                    if (result.status === 'error') throw new Error(result.message);
                    return result;
                } catch (error) {
                    console.warn("API Fail:", error.message);
                    throw error;
                }
            };

            const fetchBookings = async () => {
                setIsLoading(true);
                try {
                    const result = await apiCall('get_bookings');
                    if (result && result.data) {
                        setBookings(result.data);
                        setIsOffline(false);
                    }
                } catch (error) {
                    setIsOffline(true);
                    const stored = localStorage.getItem('bookings');
                    if (stored) setBookings(JSON.parse(stored));
                    else if (bookings.length === 0) {
                        setBookings(INITIAL_BOOKINGS);
                        localStorage.setItem('bookings', JSON.stringify(INITIAL_BOOKINGS));
                    }
                } finally {
                    setIsLoading(false);
                }
            };

            const saveToLocal = (newBookings) => {
                setBookings(newBookings);
                localStorage.setItem('bookings', JSON.stringify(newBookings));
            };

            useEffect(() => {
                fetchBookings();
                if (window.lucide) window.lucide.createIcons();
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [bookings, page]);

            const showNotification = (msg, type='success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 4000);
            };

            const handleDateSelect = (dateStr, isPast) => {
                if (isPast) {
                    // Logic moved to handleViewHistory for past dates in CalendarView onClick
                    showNotification("ไม่สามารถจองย้อนหลังได้ครับ", "error");
                    return;
                }
                setSelectedDate(dateStr);
                setBookingModalOpen(true);
            };

            const handleViewHistory = (dateStr, dayBookings) => {
                setHistoryDate(dateStr);
                setHistoryBookings(dayBookings);
                setHistoryModalOpen(true);
            };

            const handleBookingSubmit = async (newBooking) => {
                setSubmissionStatus('submitting');
                setSubmissionMessage('กำลังส่งข้อมูลไปยัง Google Sheets...');

                // Added createdAt
                const bookingPayload = { 
                    ...newBooking, 
                    status: 'รออนุมัติ',
                    createdAt: new Date().toISOString()
                };
                
                try {
                    if (!isOffline) {
                        const result = await apiCall('add_booking', { data: bookingPayload });
                        if (result && result.status === 'success') {
                            setSubmissionStatus('success');
                            setSubmissionMessage('ข้อมูลถูกบันทึกเรียบร้อยแล้ว');
                            
                            // Close modals after delay
                            setTimeout(() => {
                                setSubmissionStatus('idle');
                                setBookingModalOpen(false);
                                fetchBookings();
                            }, 1500);
                        } else {
                            throw new Error("API returned non-success status");
                        }
                    } else {
                        // Offline Mode direct save
                        throw new Error("Offline Mode");
                    }
                } catch (e) {
                    // Fallback to Offline Save
                    console.error("Online save failed, switching to offline save.", e);
                    const offlineBooking = { ...bookingPayload, id: generateId() };
                    saveToLocal([...bookings, offlineBooking]);
                    
                    setSubmissionStatus('error'); // Show error first
                    setSubmissionMessage(`เชื่อมต่อ Google Sheets ไม่สำเร็จ: ${e.message}\nระบบจะบันทึกข้อมูลไว้ในเครื่องนี้แทน เพื่อให้ข้อมูลไม่สูญหาย`);
                    
                    // Better UX: Show "Saved Offline" with yellow icon immediately to reassure user.
                    setTimeout(() => {
                        setSubmissionStatus('success-offline');
                        setSubmissionMessage(`บันทึกข้อมูลแบบออฟไลน์เรียบร้อย\n(เนื่องจากเชื่อมต่อ Server ไม่ได้)`);
                         setTimeout(() => {
                            setSubmissionStatus('idle');
                            setBookingModalOpen(false);
                        }, 2500);
                    }, 2000);
                }
            };

            const handleDeleteBooking = async (id) => {
                if(confirm("ยืนยันการลบรายการนี้?")) {
                    try {
                        if (!isOffline) {
                            const result = await apiCall('delete_booking', { id });
                            if (result && result.status === 'success') {
                                showNotification("ลบรายการเรียบร้อย", "success");
                                fetchBookings();
                            }
                        } else throw new Error("Offline");
                    } catch (e) {
                         setIsOffline(true);
                         saveToLocal(bookings.filter(b => b.id !== id));
                         showNotification("ลบรายการ (ออฟไลน์) เรียบร้อย", "warning");
                    }
                }
            };

            const handleStatusChange = async (id, newStatus) => {
                try {
                    const approvedAt = newStatus === 'อนุมัติ' ? new Date().toISOString() : null;
                    if (!isOffline) {
                        const result = await apiCall('update_status', { id, status: newStatus, approvedAt });
                        if (result && result.status === 'success') {
                            showNotification(`ปรับสถานะเป็น ${newStatus} แล้ว`);
                            fetchBookings();
                        }
                    } else throw new Error("Offline");
                } catch (e) {
                    setIsOffline(true);
                    saveToLocal(bookings.map(b => {
                        if (b.id === id) {
                            return { 
                                ...b, 
                                status: newStatus, 
                                approvedAt: newStatus === 'อนุมัติ' ? new Date().toISOString() : b.approvedAt 
                            };
                        }
                        return b;
                    }));
                    showNotification(`ปรับสถานะเป็น ${newStatus} (ออฟไลน์) แล้ว`, "warning");
                }
            };

            const handleLogin = (success) => {
                if (success) {
                    setIsAdmin(true);
                    setPage('home');
                    showNotification("ยินดีต้อนรับ Admin");
                }
            };

            const handleLogout = () => {
                setIsAdmin(false);
                setPage('home');
                showNotification("ออกจากระบบแล้ว");
            };

            return (
                <div className="min-h-screen pb-10">
                    <Navbar setPage={setPage} currentPage={page} isAdmin={isAdmin} handleLogout={handleLogout} isLoading={isLoading} isOffline={isOffline} />
                    
                    {/* Submission Status Overlay */}
                    <SubmissionOverlay 
                        status={submissionStatus} 
                        message={submissionMessage} 
                        onClose={() => {
                            setSubmissionStatus('idle');
                            setBookingModalOpen(false);
                        }}
                    />

                    {/* Notification Toast (Keep for minor updates) */}
                    {notification && (
                        <div className={`fixed top-20 right-4 z-[70] px-6 py-3 rounded shadow-lg text-white font-bold animate-pulse
                            ${notification.type === 'error' ? 'bg-red-500' : (notification.type === 'warning' ? 'bg-orange-500' : 'bg-green-500')}`}>
                            {notification.msg}
                        </div>
                    )}

                    <div className="container mx-auto px-4">
                        {page === 'home' && (
                            <CalendarView 
                                bookings={bookings} 
                                onSelectDate={handleDateSelect} 
                                onSelectBooking={setSelectedBooking}
                                onViewHistory={handleViewHistory}
                                refreshData={fetchBookings}
                            />
                        )}
                        {page === 'list' && (
                            <BookingListView 
                                bookings={bookings} 
                                onDelete={handleDeleteBooking}
                                onStatusChange={handleStatusChange}
                                isAdmin={isAdmin}
                                refreshData={fetchBookings}
                            />
                        )}
                        {page === 'stats' && <StatsView bookings={bookings} />}
                        {page === 'login' && <LoginView onLogin={handleLogin} />}
                    </div>

                    <BookingModal 
                        isOpen={isBookingModalOpen} 
                        onClose={() => setBookingModalOpen(false)} 
                        date={selectedDate}
                        onSubmit={handleBookingSubmit}
                        isSubmitting={submissionStatus === 'submitting'}
                        onError={(msg) => showNotification(msg, 'error')}
                    />

                    <HistoryModal 
                        isOpen={isHistoryModalOpen}
                        onClose={() => setHistoryModalOpen(false)}
                        date={historyDate}
                        bookings={historyBookings}
                    />

                    <DetailModal 
                        booking={selectedBooking} 
                        onClose={() => setSelectedBooking(null)} 
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
